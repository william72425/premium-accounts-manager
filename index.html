<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <title>Premium Accounts Manager - William</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
        }

        /* Glass morphism effects */
        .glass-card {
            background: rgba(18, 18, 27, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 195, 247, 0.2);
            border-radius: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(79, 195, 247, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .logo h1 {
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 24px;
        }

        .btn-primary, .btn-secondary, .btn-danger, .btn-warning {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            color: white;
        }

        .btn-secondary {
            background: rgba(79, 195, 247, 0.2);
            border: 1px solid rgba(79, 195, 247, 0.5);
            color: #4fc3f7;
        }

        .btn-danger {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: #ff5252;
        }

        .btn-warning {
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid rgba(255, 152, 0, 0.5);
            color: #ff9800;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .product-card {
            background: linear-gradient(135deg, #0f0f1a 0%, #16162a 100%);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(79, 195, 247, 0.2);
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4fc3f7, #7c4dff);
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #4fc3f7;
            box-shadow: 0 10px 40px rgba(79, 195, 247, 0.2);
        }

        /* Account Cards - Clean Design */
        .account-card {
            background: #0f0f1a;
            border-radius: 16px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid rgba(79, 195, 247, 0.15);
            transition: all 0.2s;
        }

        .account-card:hover {
            border-color: rgba(79, 195, 247, 0.4);
        }

        .account-header {
            padding: 16px;
            background: rgba(79, 195, 247, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            cursor: pointer;
        }

        .account-email {
            font-weight: 600;
            color: #4fc3f7;
            font-size: 14px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-success { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid #4caf50; }
        .badge-warning { background: rgba(255, 152, 0, 0.2); color: #ff9800; border: 1px solid #ff9800; }
        .badge-danger { background: rgba(244, 67, 54, 0.2); color: #f44336; border: 1px solid #f44336; }
        .badge-info { background: rgba(79, 195, 247, 0.2); color: #4fc3f7; border: 1px solid #4fc3f7; }

        .account-details-preview {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 13px;
            color: #888;
        }

        .account-expanded {
            padding: 16px;
            border-top: 1px solid rgba(79, 195, 247, 0.1);
            background: #0a0a0f;
            display: none;
        }

        .account-expanded.active {
            display: block;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        .info-label {
            color: #888;
            font-weight: 500;
        }

        .info-value {
            color: #e0e0e0;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .icon-btn {
            background: rgba(79, 195, 247, 0.1);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #4fc3f7;
            font-size: 12px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: rgba(79, 195, 247, 0.2);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            max-width: 550px;
            margin: 40px auto;
            background: #0f0f1a;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(79, 195, 247, 0.3);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #4fc3f7;
            font-weight: 500;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid rgba(79, 195, 247, 0.2);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        /* Dashboard */
        .dashboard {
            background: linear-gradient(135deg, #0f0f1a 0%, #16162a 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(79, 195, 247, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .stat-item {
            background: rgba(79, 195, 247, 0.05);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #4fc3f7;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        /* Filter Bar */
        .filter-bar {
            background: #0f0f1a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid rgba(79, 195, 247, 0.15);
        }

        .filter-bar select, .filter-bar input {
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid rgba(79, 195, 247, 0.2);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 13px;
        }

        .creator-link {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #888;
            font-size: 12px;
        }

        .creator-link a {
            color: #4fc3f7;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .info-value { max-width: 55%; font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <h1>⚡ Premium Vault</h1>
            <p style="font-size: 12px; color: #888;">by <a href="#" onclick="window.open('tg://resolve?domain=william815')" style="color: #4fc3f7;">@william815</a></p>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px;">
            <button class="btn-primary" onclick="showAddProductModal()">➕ New Product</button>
            <button class="btn-secondary" onclick="exportData()">📤 Export</button>
            <button class="btn-secondary" onclick="importData()">📥 Import</button>
        </div>
    </div>

    <div id="productGrid" class="product-grid"></div>
    <div id="productDetailView" style="display: none;">
        <button class="btn-secondary" onclick="backToProducts()" style="margin-bottom: 16px;">← Back</button>
        <div id="productDetailContent"></div>
    </div>
</div>

<!-- Account Modal -->
<div id="accountModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color: #4fc3f7; margin-bottom: 20px;">Add Account</h2>
        <form id="accountForm">
            <input type="hidden" id="editAccountId">
            <div class="form-group">
                <label>Product *</label>
                <select id="productNameSelect" required>
                    <option value="">Select Product</option>
                </select>
                <input type="text" id="newProductName" placeholder="Or add new product" style="margin-top: 8px;">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="text" id="password">
            </div>
            <div class="form-group">
                <label>Subscription (Pro/Premium/Standard)</label>
                <input type="text" id="subscriptionName" placeholder="e.g., Pro, Premium">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="statusTag">
                    <option value="Free">Free</option>
                    <option value="Using">Using</option>
                    <option value="Sold">Sold</option>
                    <option value="Gave someone">Gave someone</option>
                </select>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="accountType">
                    <option value="Trial">Trial</option>
                    <option value="Hitter">Hitter</option>
                    <option value="Purchased">Purchased</option>
                </select>
            </div>
            <div class="form-group">
                <label>Claimed Date</label>
                <input type="date" id="claimedDate">
            </div>
            <div class="form-group">
                <label>Duration</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="durationValue" placeholder="Number" style="flex:1">
                    <select id="durationUnit" style="flex:1">
                        <option value="days">Days</option>
                        <option value="weeks">Weeks</option>
                        <option value="months">Months</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="accountNumber">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username">
            </div>
            <div class="form-group">
                <label>Note</label>
                <textarea id="note" rows="2"></textarea>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-primary">💾 Save</button>
                <button type="button" class="btn-secondary" onclick="closeModal('accountModal')">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Product Modal -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <h2 style="color: #4fc3f7;">New Product</h2>
        <form id="productForm">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="newProductOnly" required placeholder="e.g., Capcut, Netflix">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-primary">Create</button>
                <button type="button" class="btn-secondary" onclick="closeModal('productModal')">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
    let products = [];
    let accounts = [];
    let currentProduct = null;

    // Load data
    function loadData() {
        products = JSON.parse(localStorage.getItem('premium_products') || '["Capcut", "Netflix", "Spotify"]');
        accounts = JSON.parse(localStorage.getItem('premium_accounts') || '[]');
        if (products.length === 0) products = ['Capcut', 'Netflix', 'Spotify'];
        saveProducts();
    }

    function saveProducts() { localStorage.setItem('premium_products', JSON.stringify(products)); }
    function saveAccounts() { localStorage.setItem('premium_accounts', JSON.stringify(accounts)); }

    // Render product grid
    function renderProducts() {
        const grid = document.getElementById('productGrid');
        if (!grid) return;
        
        if (products.length === 0) {
            grid.innerHTML = '<div class="glass-card" style="padding: 40px; text-align: center;">No products. Click + New Product</div>';
            return;
        }
        
        grid.innerHTML = products.map(p => {
            const productAccounts = accounts.filter(a => a.productName === p);
            const free = productAccounts.filter(a => a.statusTag === 'Free').length;
            const total = productAccounts.length;
            return `
                <div class="product-card" onclick="viewProduct('${escapeHtml(p)}')">
                    <div style="font-size: 18px; font-weight: bold; margin-bottom: 12px;">🎬 ${escapeHtml(p)}</div>
                    <div style="display: flex; gap: 12px; font-size: 13px; color: #888;">
                        <span>📊 Total: ${total}</span>
                        <span>🟢 Free: ${free}</span>
                    </div>
                    <div style="margin-top: 16px; display: flex; gap: 8px;" onclick="event.stopPropagation()">
                        <button class="btn-secondary" style="flex:1; padding: 8px;" onclick="addAccountToProduct('${escapeHtml(p)}')">+ Add</button>
                        <button class="btn-danger" style="flex:0; padding: 8px;" onclick="deleteProduct('${escapeHtml(p)}')">🗑</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // View product with clean account cards
    function viewProduct(productName) {
        currentProduct = productName;
        document.getElementById('productGrid').style.display = 'none';
        document.getElementById('productDetailView').style.display = 'block';
        
        const productAccounts = accounts.filter(a => a.productName === productName);
        const total = productAccounts.length;
        const free = productAccounts.filter(a => a.statusTag === 'Free').length;
        const using = productAccounts.filter(a => a.statusTag === 'Using').length;
        const sold = productAccounts.filter(a => a.statusTag === 'Sold').length;
        const expired = productAccounts.filter(a => calculateDaysLeft(a.expiredDate) <= 0).length;
        
        const dashboard = `
            <div class="dashboard">
                <h2 style="color: #4fc3f7;">📱 ${escapeHtml(productName)}</h2>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-number">${total}</div><div class="stat-label">Total</div></div>
                    <div class="stat-item"><div class="stat-number">${free}</div><div class="stat-label">Free</div></div>
                    <div class="stat-item"><div class="stat-number">${using}</div><div class="stat-label">Using</div></div>
                    <div class="stat-item"><div class="stat-number">${sold}</div><div class="stat-label">Sold</div></div>
                    <div class="stat-item"><div class="stat-number">${expired}</div><div class="stat-label">Expired</div></div>
                </div>
            </div>
            <div class="filter-bar">
                <select id="filterStatus" onchange="renderAccountList()">
                    <option value="">All Status</option>
                    <option value="Free">Free</option>
                    <option value="Using">Using</option>
                    <option value="Sold">Sold</option>
                </select>
                <select id="filterType" onchange="renderAccountList()">
                    <option value="">All Types</option>
                    <option value="Trial">Trial</option>
                    <option value="Hitter">Hitter</option>
                    <option value="Purchased">Purchased</option>
                </select>
                <input type="text" id="searchEmail" placeholder="🔍 Search email..." onkeyup="renderAccountList()" style="flex:1; min-width: 150px;">
                <button class="btn-primary" onclick="addAccountToProduct('${productName}')">+ Add Account</button>
            </div>
            <div id="accountsContainer"></div>
        `;
        
        document.getElementById('productDetailContent').innerHTML = dashboard;
        renderAccountList();
    }

    function renderAccountList() {
        if (!currentProduct) return;
        
        let filtered = accounts.filter(a => a.productName === currentProduct);
        const statusFilter = document.getElementById('filterStatus')?.value;
        const typeFilter = document.getElementById('filterType')?.value;
        const search = document.getElementById('searchEmail')?.value.toLowerCase();
        
        if (statusFilter) filtered = filtered.filter(a => a.statusTag === statusFilter);
        if (typeFilter) filtered = filtered.filter(a => a.accountType === typeFilter);
        if (search) filtered = filtered.filter(a => a.email?.toLowerCase().includes(search));
        
        const container = document.getElementById('accountsContainer');
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="glass-card" style="padding: 40px; text-align: center;">No accounts found</div>';
            return;
        }
        
        container.innerHTML = filtered.map(acc => {
            const daysLeft = calculateDaysLeft(acc.expiredDate);
            let statusColor = 'badge-success';
            if (daysLeft <= 0) statusColor = 'badge-danger';
            else if (daysLeft <= 7) statusColor = 'badge-warning';
            
            const statusClass = acc.statusTag === 'Free' ? 'badge-success' : (acc.statusTag === 'Using' ? 'badge-warning' : 'badge-danger');
            
            return `
                <div class="account-card" id="acc-${acc.id}">
                    <div class="account-header" onclick="toggleAccDetails('${acc.id}')">
                        <div>
                            <div class="account-email">📧 ${escapeHtml(acc.email)}</div>
                            <div style="font-size: 11px; color: #666; margin-top: 4px;">#${acc.accountNumber || 'N/A'}</div>
                        </div>
                        <div class="account-details-preview">
                            <span class="badge ${statusColor}">📅 ${daysLeft} d</span>
                            <span class="badge ${statusClass}">${acc.statusTag}</span>
                            <span class="badge badge-info">${acc.subscriptionName || 'Std'}</span>
                        </div>
                    </div>
                    <div class="account-expanded" id="details-${acc.id}">
                        <div class="info-row"><span class="info-label">🔑 Password</span><span class="info-value">${acc.password || '••••••'}</span><button class="icon-btn" onclick="copyText('${acc.password || ''}')">Copy</button></div>
                        <div class="info-row"><span class="info-label">👤 Username</span><span class="info-value">${acc.username || '—'}</span></div>
                        <div class="info-row"><span class="info-label">📅 Claimed</span><span class="info-value">${acc.claimedDate || '—'}</span></div>
                        <div class="info-row"><span class="info-label">⏰ Expires</span><span class="info-value">${acc.expiredDate || '—'} (${daysLeft} days left)</span></div>
                        <div class="info-row"><span class="info-label">🏷️ Type</span><span class="info-value">${acc.accountType || '—'}</span></div>
                        <div class="info-row"><span class="info-label">📝 Note</span><span class="info-value">${acc.note || '—'}</span></div>
                        <div class="action-buttons">
                            <button class="icon-btn" onclick="editAccount('${acc.id}')">✏️ Edit</button>
                            <button class="icon-btn" onclick="copyText('${acc.email}')">📧 Copy Email</button>
                            <button class="icon-btn" onclick="copyText('${acc.password || ''}')">🔑 Copy Password</button>
                            <button class="btn-danger" style="padding: 6px 12px;" onclick="deleteAccount('${acc.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleAccDetails(id) {
        const details = document.getElementById(`details-${id}`);
        if (details) details.classList.toggle('active');
    }

    // Add/Edit account
    function addAccountToProduct(productName = null) {
        const select = document.getElementById('productNameSelect');
        select.innerHTML = '<option value="">Select Product</option>' + products.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        if (productName) select.value = productName;
        
        document.getElementById('accountForm').reset();
        document.getElementById('editAccountId').value = '';
        document.getElementById('modalTitle').innerText = 'Add Account';
        document.getElementById('claimedDate').value = new Date().toISOString().split('T')[0];
        openModal('accountModal');
    }

    function editAccount(accountId) {
        const acc = accounts.find(a => a.id === accountId);
        if (!acc) return;
        
        const select = document.getElementById('productNameSelect');
        select.innerHTML = '<option value="">Select Product</option>' + products.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        
        document.getElementById('editAccountId').value = acc.id;
        document.getElementById('productNameSelect').value = acc.productName;
        document.getElementById('email').value = acc.email;
        document.getElementById('password').value = acc.password || '';
        document.getElementById('subscriptionName').value = acc.subscriptionName || '';
        document.getElementById('statusTag').value = acc.statusTag || 'Free';
        document.getElementById('accountType').value = acc.accountType || 'Trial';
        document.getElementById('claimedDate').value = acc.claimedDate || '';
        document.getElementById('durationValue').value = acc.durationValue || '';
        document.getElementById('durationUnit').value = acc.durationUnit || 'days';
        document.getElementById('accountNumber').value = acc.accountNumber || '';
        document.getElementById('username').value = acc.username || '';
        document.getElementById('note').value = acc.note || '';
        document.getElementById('modalTitle').innerText = 'Edit Account';
        
        calculateExpiredDate();
        openModal('accountModal');
    }

    document.getElementById('accountForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        
        let productName = document.getElementById('productNameSelect').value;
        const newProduct = document.getElementById('newProductName').value.trim();
        if (newProduct) {
            productName = newProduct;
            if (!products.includes(productName)) {
                products.push(productName);
                saveProducts();
                renderProducts();
            }
        }
        if (!productName) { alert('Select product'); return; }
        
        const email = document.getElementById('email').value;
        const editId = document.getElementById('editAccountId').value;
        const duplicate = accounts.some(a => a.productName === productName && a.email === email && a.id !== editId);
        if (duplicate) { alert('Email already used for this product!'); return; }
        
        const account = {
            id: editId || Date.now().toString(),
            productName, email,
            password: document.getElementById('password').value,
            subscriptionName: document.getElementById('subscriptionName').value,
            statusTag: document.getElementById('statusTag').value,
            accountType: document.getElementById('accountType').value,
            claimedDate: document.getElementById('claimedDate').value,
            durationValue: parseInt(document.getElementById('durationValue').value) || 0,
            durationUnit: document.getElementById('durationUnit').value,
            expiredDate: document.getElementById('expiredDate')?.value || '',
            accountNumber: document.getElementById('accountNumber').value,
            username: document.getElementById('username').value,
            note: document.getElementById('note').value,
            addedTime: editId ? (accounts.find(a => a.id === editId)?.addedTime || new Date().toLocaleString()) : new Date().toLocaleString()
        };
        
        if (editId) {
            const idx = accounts.findIndex(a => a.id === editId);
            if (idx !== -1) accounts[idx] = account;
        } else {
            accounts.push(account);
        }
        
        saveAccounts();
        closeModal('accountModal');
        if (currentProduct && currentProduct === productName) viewProduct(currentProduct);
        else renderProducts();
        alert('Saved!');
    });

    function calculateExpiredDate() {
        const claimed = document.getElementById('claimedDate').value;
        const val = parseInt(document.getElementById('durationValue').value);
        const unit = document.getElementById('durationUnit').value;
        if (claimed && val) {
            let date = new Date(claimed);
            if (unit === 'days') date.setDate(date.getDate() + val);
            else if (unit === 'weeks') date.setDate(date.getDate() + val * 7);
            else if (unit === 'months') date.setMonth(date.getMonth() + val);
            const expired = date.toISOString().split('T')[0];
            if (document.getElementById('expiredDate')) {
                const fakeInput = document.createElement('input');
                fakeInput.id = 'expiredDate';
                fakeInput.value = expired;
                document.getElementById('expiredDate')?.remove();
                document.getElementById('durationValue')?.insertAdjacentElement('afterend', fakeInput);
            }
            document.getElementById('daysLeftCalc')?.remove();
        }
    }

    function calculateDaysLeft(expiredDate) {
        if (!expiredDate) return 999;
        const today = new Date(); today.setHours(0,0,0,0);
        const expire = new Date(expiredDate);
        const diff = Math.ceil((expire - today) / (1000*60*60*24));
        return diff;
    }

    function deleteAccount(id) {
        if (confirm('Delete this account?')) {
            accounts = accounts.filter(a => a.id !== id);
            saveAccounts();
            if (currentProduct) viewProduct(currentProduct);
            else renderProducts();
        }
    }

    function deleteProduct(productName) {
        if (confirm(`Delete "${productName}" and all its accounts?`)) {
            products = products.filter(p => p !== productName);
            accounts = accounts.filter(a => a.productName !== productName);
            saveProducts(); saveAccounts();
            renderProducts();
            if (currentProduct === productName) backToProducts();
        }
    }

    function exportData() {
        const data = JSON.stringify({ products, accounts }, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `vault_backup_${Date.now()}.json`;
        a.click();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.products) products = data.products;
                    if (data.accounts) accounts = data.accounts;
                    saveProducts(); saveAccounts();
                    renderProducts();
                    alert('Imported!');
                } catch(err) { alert('Invalid file'); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function showAddProductModal() { openModal('productModal'); }
    document.getElementById('productForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const newP = document.getElementById('newProductOnly').value.trim();
        if (newP && !products.includes(newP)) {
            products.push(newP);
            saveProducts();
            renderProducts();
            closeModal('productModal');
            this.reset();
        } else alert('Exists or invalid');
    });

    function backToProducts() {
        currentProduct = null;
        document.getElementById('productGrid').style.display = 'grid';
        document.getElementById('productDetailView').style.display = 'none';
        renderProducts();
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert('Copied!');
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Event listeners for date calculation
    document.getElementById('claimedDate')?.addEventListener('change', () => {
        const val = document.getElementById('durationValue')?.value;
        if (val) calculateExpiredDate();
    });
    document.getElementById('durationValue')?.addEventListener('input', calculateExpiredDate);
    document.getElementById('durationUnit')?.addEventListener('change', calculateExpiredDate);

    window.onclick = e => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
    
    loadData();
    renderProducts();
</script>
</body>
</html>
