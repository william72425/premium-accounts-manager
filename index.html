<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Premium Accounts Manager - William</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Premium%20Accounts%20Manager%22,%22short_name%22:%22AccManager%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22theme_color%22:%22%231a1a2e%22,%22background_color%22:%22%231a1a2e%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20viewBox=%270%200%20100%20100%27%3E%3Crect%20width=%27100%27%20height=%27100%27%20fill=%27%231a1a2e%27/%3E%3Ctext%20x=%2750%27%20y=%2767%27%20text-anchor=%27middle%27%20fill=%27%234fc3f7%27%20font-size=%2750%27%3E📱%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22}]}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        /* Main Container */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            color: white;
            font-size: 24px;
        }

        .logo p {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary, .btn-secondary, .btn-danger {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary {
            background: #4fc3f7;
            color: #1a1a2e;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-danger {
            background: #ff5252;
            color: white;
        }

        .btn-primary:hover, .btn-secondary:hover, .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Product List */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .product-name {
            font-size: 20px;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .product-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .product-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        /* Account Cards */
        .accounts-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .account-summary-card {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            transition: all 0.2s;
        }

        .account-summary-card:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }

        .account-info {
            flex: 1;
        }

        .account-email {
            font-weight: 600;
            color: #1a1a2e;
        }

        .account-details {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #4caf50;
            color: white;
        }

        .badge-warning {
            background: #ff9800;
            color: white;
        }

        .badge-danger {
            background: #f44336;
            color: white;
        }

        .badge-info {
            background: #2196f3;
            color: white;
        }

        .copy-btn {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Dashboard */
        .dashboard {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-card {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        /* Sort and Filter */
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-bar select, .filter-bar input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .creator-link {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            color: white;
        }

        .creator-link a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .modal-content {
                margin: 20px auto;
                padding: 20px;
            }
            
            .account-summary-card {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <h1>📱 Premium Accounts Manager</h1>
            <p>Created by William | <a href="#" onclick="window.open('tg://resolve?domain=william815')" style="color: white;">@william815</a></p>
        </div>
        <div class="header-controls">
            <button class="btn-primary" onclick="showAddProductModal()">➕ Add Product</button>
            <button class="btn-secondary" onclick="exportData()">📤 Export Data</button>
            <button class="btn-secondary" onclick="importData()">📥 Import Data</button>
        </div>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="product-grid"></div>

    <!-- Product Detail View (Hidden by default) -->
    <div id="productDetailView" style="display: none;">
        <button class="btn-secondary" onclick="backToProducts()" style="margin-bottom: 20px;">← Back to Products</button>
        <div id="productDetailContent"></div>
    </div>
</div>

<!-- Add/Edit Account Modal -->
<div id="accountModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Add New Account</h2>
        <form id="accountForm">
            <input type="hidden" id="editAccountId">
            <div class="form-group">
                <label>Product Name *</label>
                <select id="productNameSelect" required onchange="toggleNewProductInput()">
                    <option value="">Select Product</option>
                </select>
                <input type="text" id="newProductName" placeholder="Or add new product name" style="margin-top: 10px;">
            </div>
            <div class="form-group">
                <label>Subscription Name (Pro, Standard, Premium, etc)</label>
                <input type="text" id="subscriptionName" placeholder="e.g., Pro, Premium, Standard">
            </div>
            <div class="form-group">
                <label>Subscription Status</label>
                <select id="subscriptionStatus">
                    <option value="claimed">Claimed</option>
                    <option value="failed">Failed</option>
                    <option value="need to re-try">Need to Re-try</option>
                </select>
            </div>
            <div class="form-group">
                <label>Claimed/Subscribed Date</label>
                <input type="date" id="claimedDate" required>
            </div>
            <div class="form-group">
                <label>Duration</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="durationValue" placeholder="Number" style="flex:1">
                    <select id="durationUnit" style="flex:1">
                        <option value="days">Days</option>
                        <option value="weeks">Weeks</option>
                        <option value="months">Months</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Expired Date (Auto-calculated)</label>
                <input type="date" id="expiredDate" readonly style="background: #f5f5f5;">
            </div>
            <div class="form-group">
                <label>Days Left to Expired</label>
                <input type="text" id="daysLeft" readonly style="background: #f5f5f5;">
            </div>
            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="accountNumber" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="text" id="password">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="accountType">
                    <option value="Trial">Trial</option>
                    <option value="Hitter">Hitter</option>
                    <option value="Purchased">Purchased</option>
                </select>
            </div>
            <div class="form-group">
                <label>Note</label>
                <textarea id="note" rows="3" placeholder="Any additional notes..."></textarea>
            </div>
            <div class="form-group">
                <label>Status Tag</label>
                <select id="statusTag">
                    <option value="Using">Using</option>
                    <option value="Free">Free</option>
                    <option value="Sold">Sold</option>
                    <option value="Gave someone">Gave someone</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-primary">Save Account</button>
                <button type="button" class="btn-secondary" onclick="closeModal('accountModal')">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Add Product Modal -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <h2>Add New Product</h2>
        <form id="productForm">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="newProductOnly" required>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-primary">Add Product</button>
                <button type="button" class="btn-secondary" onclick="closeModal('productModal')">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Storage keys
    const STORAGE_KEYS = {
        PRODUCTS: 'premium_accounts_products',
        ACCOUNTS: 'premium_accounts_data'
    };

    let products = [];
    let accounts = [];
    let currentProduct = null;

    // Initialize
    function init() {
        loadData();
        renderProducts();
        setupEventListeners();
    }

    // Load data from localStorage
    function loadData() {
        const storedProducts = localStorage.getItem(STORAGE_KEYS.PRODUCTS);
        const storedAccounts = localStorage.getItem(STORAGE_KEYS.ACCOUNTS);
        
        products = storedProducts ? JSON.parse(storedProducts) : [];
        accounts = storedAccounts ? JSON.parse(storedAccounts) : [];
        
        // Add sample data if empty
        if (products.length === 0) {
            products = ['Capcut', 'Netflix', 'Spotify'];
            saveProducts();
        }
    }

    // Save products
    function saveProducts() {
        localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products));
    }

    // Save accounts
    function saveAccounts() {
        localStorage.setItem(STORAGE_KEYS.ACCOUNTS, JSON.stringify(accounts));
    }

    // Render product grid
    function renderProducts() {
        const grid = document.getElementById('productGrid');
        if (!grid) return;
        
        if (products.length === 0) {
            grid.innerHTML = '<div style="background: white; border-radius: 20px; padding: 40px; text-align: center;">No products yet. Click "Add Product" to get started!</div>';
            return;
        }
        
        grid.innerHTML = products.map(product => {
            const productAccounts = accounts.filter(acc => acc.productName === product);
            const total = productAccounts.length;
            const claimed = productAccounts.filter(acc => acc.subscriptionStatus === 'claimed').length;
            const available = productAccounts.filter(acc => acc.statusTag === 'Free' || acc.statusTag === 'Using').length;
            
            return `
                <div class="product-card" onclick="viewProduct('${product.replace(/'/g, "\\'")}')">
                    <div class="product-name">${escapeHtml(product)}</div>
                    <div class="product-stats">
                        <span>📊 Total: ${total}</span>
                        <span>✅ Claimed: ${claimed}</span>
                        <span>🟢 Available: ${available}</span>
                    </div>
                    <div class="product-actions" onclick="event.stopPropagation()">
                        <button class="btn-secondary" onclick="addAccountToProduct('${product.replace(/'/g, "\\'")}')">➕ Add Account</button>
                        <button class="btn-danger" onclick="deleteProduct('${product.replace(/'/g, "\\'")}')">🗑️ Delete</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // View product details
    function viewProduct(productName) {
        currentProduct = productName;
        document.getElementById('productGrid').style.display = 'none';
        document.getElementById('productDetailView').style.display = 'block';
        
        const productAccounts = accounts.filter(acc => acc.productName === productName);
        
        // Dashboard stats
        const total = productAccounts.length;
        const claimed = productAccounts.filter(acc => acc.subscriptionStatus === 'claimed').length;
        const free = productAccounts.filter(acc => acc.statusTag === 'Free').length;
        const using = productAccounts.filter(acc => acc.statusTag === 'Using').length;
        const sold = productAccounts.filter(acc => acc.statusTag === 'Sold').length;
        const expiredSoon = productAccounts.filter(acc => {
            const daysLeft = calculateDaysLeft(acc.expiredDate);
            return daysLeft <= 7 && daysLeft > 0;
        }).length;
        
        const dashboard = `
            <div class="dashboard">
                <h2>📱 ${escapeHtml(productName)} Dashboard</h2>
                <div class="dashboard-stats">
                    <div class="stat-card">Total: ${total}</div>
                    <div class="stat-card">Claimed: ${claimed}</div>
                    <div class="stat-card">Free: ${free}</div>
                    <div class="stat-card">Using: ${using}</div>
                    <div class="stat-card">Sold: ${sold}</div>
                    <div class="stat-card">⚠️ Expiring Soon: ${expiredSoon}</div>
                </div>
            </div>
            <div class="filter-bar">
                <select id="filterStatus" onchange="renderAccountsView()">
                    <option value="">All Status</option>
                    <option value="Free">Free</option>
                    <option value="Using">Using</option>
                    <option value="Sold">Sold</option>
                    <option value="Gave someone">Gave someone</option>
                </select>
                <select id="filterType" onchange="renderAccountsView()">
                    <option value="">All Types</option>
                    <option value="Trial">Trial</option>
                    <option value="Hitter">Hitter</option>
                    <option value="Purchased">Purchased</option>
                </select>
                <input type="text" id="searchEmail" placeholder="Search email..." onkeyup="renderAccountsView()">
                <button class="btn-primary" onclick="addAccountToProduct('${productName}')">+ Add Account</button>
            </div>
            <div class="accounts-container">
                <h3>Account List</h3>
                <div id="accountsList"></div>
            </div>
        `;
        
        document.getElementById('productDetailContent').innerHTML = dashboard;
        renderAccountsView();
    }
    
    function renderAccountsView() {
        if (!currentProduct) return;
        
        let filtered = accounts.filter(acc => acc.productName === currentProduct);
        
        const statusFilter = document.getElementById('filterStatus')?.value;
        const typeFilter = document.getElementById('filterType')?.value;
        const searchEmail = document.getElementById('searchEmail')?.value.toLowerCase();
        
        if (statusFilter) filtered = filtered.filter(acc => acc.statusTag === statusFilter);
        if (typeFilter) filtered = filtered.filter(acc => acc.accountType === typeFilter);
        if (searchEmail) filtered = filtered.filter(acc => acc.email.toLowerCase().includes(searchEmail));
        
        const container = document.getElementById('accountsList');
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px;">No accounts found</div>';
            return;
        }
        
        container.innerHTML = filtered.map(acc => {
            const daysLeft = calculateDaysLeft(acc.expiredDate);
            const statusColor = daysLeft <= 0 ? 'badge-danger' : (daysLeft <= 7 ? 'badge-warning' : 'badge-success');
            
            return `
                <div class="account-summary-card">
                    <div class="account-info">
                        <div class="account-email">${escapeHtml(acc.email)}</div>
                        <div style="font-size: 12px; color: #666;">Acc #: ${acc.accountNumber || 'N/A'}</div>
                    </div>
                    <div class="account-details">
                        <span class="badge ${statusColor}">📅 ${daysLeft} days left</span>
                        <span class="badge badge-info">${acc.subscriptionName || 'Standard'}</span>
                        <span class="badge ${acc.statusTag === 'Free' ? 'badge-success' : (acc.statusTag === 'Using' ? 'badge-warning' : 'badge-danger')}">${acc.statusTag}</span>
                        <button class="copy-btn" onclick="copyText('${acc.email}')">📧 Copy</button>
                        <button class="copy-btn" onclick="copyText('${acc.password || ''}')">🔑 Copy PW</button>
                        <button class="btn-secondary" onclick="viewAccountDetails('${acc.id}')">📄 Details</button>
                        <button class="btn-danger" onclick="deleteAccount('${acc.id}')">🗑️</button>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function viewAccountDetails(accountId) {
        const account = accounts.find(a => a.id === accountId);
        if (!account) return;
        
        const daysLeft = calculateDaysLeft(account.expiredDate);
        alert(`
📋 ACCOUNT DETAILS
━━━━━━━━━━━━━━━━━━━
Product: ${account.productName}
Subscription: ${account.subscriptionName || 'N/A'}
Status: ${account.subscriptionStatus}
Claimed: ${account.claimedDate}
Expired: ${account.expiredDate}
Days Left: ${daysLeft}
━━━━━━━━━━━━━━━━━━━
Acc #: ${account.accountNumber || 'N/A'}
Username: ${account.username || 'N/A'}
Email: ${account.email}
Password: ${account.password || 'N/A'}
Type: ${account.accountType}
Note: ${account.note || 'N/A'}
Status Tag: ${account.statusTag}
Added: ${account.addedTime}
        `);
    }
    
    function addAccountToProduct(productName = null) {
        const select = document.getElementById('productNameSelect');
        select.innerHTML = '<option value="">Select Product</option>' + products.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        
        if (productName) {
            select.value = productName;
        }
        
        document.getElementById('accountForm').reset();
        document.getElementById('editAccountId').value = '';
        document.getElementById('modalTitle').innerText = 'Add New Account';
        document.getElementById('claimedDate').value = new Date().toISOString().split('T')[0];
        calculateExpiredDate();
        openModal('accountModal');
    }
    
    function calculateExpiredDate() {
        const claimedDate = document.getElementById('claimedDate').value;
        const durationValue = parseInt(document.getElementById('durationValue').value);
        const durationUnit = document.getElementById('durationUnit').value;
        
        if (claimedDate && durationValue) {
            let date = new Date(claimedDate);
            if (durationUnit === 'days') date.setDate(date.getDate() + durationValue);
            else if (durationUnit === 'weeks') date.setDate(date.getDate() + (durationValue * 7));
            else if (durationUnit === 'months') date.setMonth(date.getMonth() + durationValue);
            
            const expiredDate = date.toISOString().split('T')[0];
            document.getElementById('expiredDate').value = expiredDate;
            
            const daysLeft = calculateDaysLeft(expiredDate);
            document.getElementById('daysLeft').value = daysLeft + ' days left';
        }
    }
    
    function calculateDaysLeft(expiredDate) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const expire = new Date(expiredDate);
        const diffTime = expire - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        return diffDays;
    }
    
    // Save account
    document.getElementById('accountForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        
        let productName = document.getElementById('productNameSelect').value;
        const newProductName = document.getElementById('newProductName').value.trim();
        
        if (newProductName) {
            productName = newProductName;
            if (!products.includes(productName)) {
                products.push(productName);
                saveProducts();
                renderProducts();
            }
        }
        
        if (!productName) {
            alert('Please select or add a product name');
            return;
        }
        
        const email = document.getElementById('email').value;
        
        // Check for duplicate email in same product
        const editId = document.getElementById('editAccountId').value;
        const duplicate = accounts.some(acc => acc.productName === productName && acc.email === email && acc.id !== editId);
        
        if (duplicate) {
            alert('This email is already used for this product!');
            return;
        }
        
        const accountData = {
            id: editId || Date.now().toString(),
            productName: productName,
            subscriptionName: document.getElementById('subscriptionName').value,
            subscriptionStatus: document.getElementById('subscriptionStatus').value,
            claimedDate: document.getElementById('claimedDate').value,
            durationValue: parseInt(document.getElementById('durationValue').value) || 0,
            durationUnit: document.getElementById('durationUnit').value,
            expiredDate: document.getElementById('expiredDate').value,
            accountNumber: document.getElementById('accountNumber').value,
            username: document.getElementById('username').value,
            email: email,
            password: document.getElementById('password').value,
            accountType: document.getElementById('accountType').value,
            note: document.getElementById('note').value,
            statusTag: document.getElementById('statusTag').value,
            addedTime: editId ? (accounts.find(a => a.id === editId)?.addedTime || new Date().toLocaleString()) : new Date().toLocaleString()
        };
        
        if (editId) {
            const index = accounts.findIndex(a => a.id === editId);
            if (index !== -1) accounts[index] = accountData;
        } else {
            accounts.push(accountData);
        }
        
        saveAccounts();
        closeModal('accountModal');
        
        if (currentProduct && currentProduct === productName) {
            viewProduct(currentProduct);
        } else {
            renderProducts();
        }
        
        alert('Account saved successfully!');
    });
    
    function deleteAccount(accountId) {
        if (confirm('Are you sure you want to delete this account?')) {
            accounts = accounts.filter(a => a.id !== accountId);
            saveAccounts();
            if (currentProduct) viewProduct(currentProduct);
            else renderProducts();
        }
    }
    
    function deleteProduct(productName) {
        if (confirm(`Delete product "${productName}" and all its accounts?`)) {
            products = products.filter(p => p !== productName);
            accounts = accounts.filter(a => a.productName !== productName);
            saveProducts();
            saveAccounts();
            renderProducts();
        }
    }
    
    function exportData() {
        const data = { products, accounts };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `premium_accounts_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert('Data exported successfully!');
    }
    
    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = event => {
                try {
                    const data = JSON.parse(event.target.result);
                    if (data.products) products = data.products;
                    if (data.accounts) accounts = data.accounts;
                    saveProducts();
                    saveAccounts();
                    renderProducts();
                    alert('Data imported successfully!');
                } catch (err) {
                    alert('Invalid file format');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }
    
    function showAddProductModal() {
        openModal('productModal');
    }
    
    document.getElementById('productForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const newProduct = document.getElementById('newProductOnly').value.trim();
        if (newProduct && !products.includes(newProduct)) {
            products.push(newProduct);
            saveProducts();
            renderProducts();
            closeModal('productModal');
            document.getElementById('productForm').reset();
        } else if (products.includes(newProduct)) {
            alert('Product already exists!');
        }
    });
    
    function backToProducts() {
        currentProduct = null;
        document.getElementById('productGrid').style.display = 'grid';
        document.getElementById('productDetailView').style.display = 'none';
        renderProducts();
    }
    
    function toggleNewProductInput() {
        const select = document.getElementById('productNameSelect');
        const newProductInput = document.getElementById('newProductName');
        if (select.value === '') {
            newProductInput.style.display = 'block';
        } else {
            newProductInput.style.display = 'none';
            newProductInput.value = '';
        }
    }
    
    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert('Copied to clipboard!');
    }
    
    function openModal(modalId) {
        document.getElementById(modalId).style.display = 'block';
    }
    
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function setupEventListeners() {
        document.getElementById('claimedDate')?.addEventListener('change', calculateExpiredDate);
        document.getElementById('durationValue')?.addEventListener('input', calculateExpiredDate);
        document.getElementById('durationUnit')?.addEventListener('change', calculateExpiredDate);
        
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };
    }
    
    init();
</script>
</body>
</html>
