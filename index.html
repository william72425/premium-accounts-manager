<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Premium Accounts Manager - Track all your premium accounts">
    <title>Premium Vault | Account Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>🔐 Premium Vault</h1>
                    <p>by <a href="#" id="creatorLink">@william815</a></p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="addProductBtn">
                        <span>+</span> New Product
                    </button>
                    <button class="btn btn-outline" id="exportBtn">
                        📤 Export
                    </button>
                    <button class="btn btn-outline" id="importBtn">
                        📥 Import
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Products Grid View -->
            <div id="productsView" class="products-view">
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here -->
                </div>
            </div>

            <!-- Product Detail View -->
            <div id="detailView" class="detail-view" style="display: none;">
                <div class="detail-header">
                    <button class="btn btn-back" id="backBtn">← Back to Products</button>
                    <h2 id="detailTitle"></h2>
                </div>
                <div id="detailContent"></div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Account Modal -->
    <div id="accountModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Account</h2>
                <button class="modal-close" onclick="closeModal('accountModal')">&times;</button>
            </div>
            <form id="accountForm">
                <input type="hidden" id="editAccountId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Product Name *</label>
                        <select id="productSelect" required>
                            <option value="">-- Select Product --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Or Add New Product</label>
                        <input type="text" id="newProductInput" placeholder="Enter new product name">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" required placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="text" id="password" placeholder="••••••••">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Subscription Plan</label>
                        <input type="text" id="subscriptionName" placeholder="Pro / Premium / Standard">
                    </div>
                    <div class="form-group">
                        <label>Account Number</label>
                        <input type="text" id="accountNumber" placeholder="Optional">
                    </div>
                </div>

                <!-- Method Section -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Method</label>
                        <select id="method">
                            <option value="">-- Select Method (Optional) --</option>
                            <option value="Bin">Bin</option>
                            <option value="Shopify card">Shopify card</option>
                            <option value="Custom">Custom</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Custom Method Tag</label>
                        <input type="text" id="customMethod" placeholder="Or enter custom method">
                    </div>
                </div>

                <!-- Card Details Section -->
                <div class="form-group">
                    <label>💳 Card Details (Optional)</label>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Card ID</label>
                        <input type="text" id="cardId" placeholder="Long card number">
                    </div>
                    <div class="form-group">
                        <label>Expiry (MM/YY)</label>
                        <input type="text" id="cardExpiry" placeholder="01/26">
                    </div>
                    <div class="form-group">
                        <label>CVC</label>
                        <input type="text" id="cardCvc" placeholder="123">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Status Tag</label>
                        <select id="statusTag">
                            <option value="Free">🟢 Free</option>
                            <option value="Using">🔵 Using</option>
                            <option value="Sold">🔴 Sold</option>
                            <option value="Gave someone">🎁 Gave someone</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Account Type</label>
                        <select id="accountType">
                            <option value="Trial">Trial</option>
                            <option value="Hitter">Hitter</option>
                            <option value="Purchased">Purchased</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Claimed Date</label>
                        <input type="date" id="claimedDate">
                    </div>
                    <div class="form-group">
                        <label>Duration</label>
                        <div class="duration-group">
                            <input type="number" id="durationValue" placeholder="Number" style="width: 60%;">
                            <select id="durationUnit" style="width: 38%;">
                                <option value="days">Days</option>
                                <option value="weeks">Weeks</option>
                                <option value="months">Months</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label>Expiry Info</label>
                        <input type="text" id="expiryInfo" readonly placeholder="Auto-calculated">
                    </div>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="note" rows="3" placeholder="Any additional information..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Save Account</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('accountModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Product</h2>
                <button class="modal-close" onclick="closeModal('productModal')">&times;</button>
            </div>
            <form id="productForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" required placeholder="e.g., Netflix, Spotify, Capcut">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Product</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('productModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
                        </html>
